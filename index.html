<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Atlas — See what's next</title>
    <meta name="description" content="Atlas turns your GitHub, Stripe, Linear, and Notion activity into one map: the constraint slowing you down, the evidence behind it, and the next move." />
    <meta name="author" content="Atlas" />

    <meta property="og:title" content="Atlas — See what's next" />
    <meta property="og:description" content="One map. The constraint, the evidence, the next move." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function() {
        try {
          const stored = localStorage.getItem("atlas.theme");
          if (stored === "dark") {
            document.documentElement.classList.add("dark");
          } else if (stored === "paper") {
            document.documentElement.classList.add("theme-paper");
          } else {
            document.documentElement.classList.add("theme-clean");
          }
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
