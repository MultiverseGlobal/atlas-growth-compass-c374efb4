<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --background: #0f0f11;
      --card: #18181b;
      --border: rgba(255, 255, 255, 0.08);
      --primary: #f59e0b; /* Amber */
      --primary-hover: #d97706;
      --foreground: #f4f4f5;
      --muted: #a1a1aa;
      --success: #10b981;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .badge {
      font-size: 9px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: var(--primary);
      padding: 2px 6px;
      border-radius: 99px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .auth-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .status-connected {
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .status-disconnected {
      background-color: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    .btn-sync {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--foreground);
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.2s;
    }

    .btn-sync:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--muted);
    }

    .action-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 12px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-action {
      background: var(--primary);
      color: #0f0f11;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-action:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      border: 2px solid rgba(0, 0, 0, 0.1);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border-left-color: #0f0f11;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-container">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color: var(--primary);">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <span class="logo-text">Atlas HQ</span>
      </div>
      <span class="badge">Sourcing Helper</span>
    </div>

    <!-- Auth Status -->
    <div class="auth-section">
      <div>
        <span id="status-dot" class="status-dot status-disconnected"></span>
        <span id="status-text">Disconnected</span>
      </div>
      <button id="btn-sync-session" class="btn-sync">Sync Active Session</button>
    </div>

    <!-- Main action card -->
    <div class="action-card">
      <div>
        <div class="info-label">Active Tab</div>
        <div id="tab-title" class="info-value">Loading...</div>
      </div>
      <div>
        <div class="info-label">Notion CRM DB</div>
        <div id="notion-db-title" class="info-value">Not configured</div>
      </div>

      <button id="btn-push" class="btn-action" disabled>
        Push to Atlas HQ
      </button>
    </div>

    <!-- Footer feedback -->
    <div id="footer-msg" class="footer">
      Open Atlas HQ (Vercel or localhost) and click Sync to authorize.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
